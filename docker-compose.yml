services:
  postgres:
    image: postgres:16
    container_name: macrossh_postgres_dev
    environment:
      POSTGRES_USER: macrossh_user
      POSTGRES_PASSWORD: macrossh_pass
      POSTGRES_DB: macrossh_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgweb:
    image: sosedoff/pgweb
    container_name: macrossh_pgweb
    ports:
      - "8081:8081"
    environment:
      - DATABASE_URL=postgres://macrossh_user:macrossh_pass@postgres:5432/macrossh_db?sslmode=disable
    depends_on:
      - postgres

volumes:
  postgres_data: